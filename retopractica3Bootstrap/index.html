<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">

        <div class="bg-white p-5 border rounded">

            <h1 class="display-2 fw-bold text-dark">
                Estado del Servidor
            </h1>

            <p class="text-secondary fs-5">
                Panel de control de servicios activos.
            </p>

            <hr class="my-4">

           <div class="alert text-bg-danger fw-semibold" role="alert">
                ERROR CRÍTICO:
                <span class="fw-normal">
                    La base de datos no responde.
                </span>
            </div>

              <div class="alert text-bg-warning" role="alert">
                <strong>Aviso:</strong>
                El espacio en disco está al
                <em>90% de su capacidad.</em>
            </div>

           <div class="alert text-bg-primary" role="alert">
                <strong>Sistema:</strong>
                Todos los demás servicios están OPERATIVOS.
            </div>

            <p class="text-center text-secondary mt-5">
                Última actualización: Hace 5 minutos
            </p>

        </div>

    </div>
</body>
</html>
